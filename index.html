<meta charset="UTF-8">

<title>Fichas Técnicas — Linet</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F5F0EF;color:#2C2C2A;min-height:100vh;padding:2rem 1rem;}
.page{max-width:920px;margin:0 auto;}

/* Header */
.header{background:#8B1A1A;border-radius:12px;padding:1.25rem 1.75rem;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;}
.header h1{font-size:15px;font-weight:700;color:#fff;}
.header p{font-size:12px;color:#F5C0C0;margin-top:3px;}
.logo{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px;flex-shrink:0;}

/* Selectores */
.selectors{background:#fff;border:0.5px solid #DDD8D8;border-radius:12px;padding:1.1rem 1.5rem;margin-bottom:1.1rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;}
.sel-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px;}
.sel-group label{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:#888;font-weight:700;}
.sel-group select{font-size:13px;padding:8px 10px;border:0.5px solid #C8C0C0;border-radius:8px;background:#fff;color:#2C2C2A;cursor:pointer;}
.sel-group select:focus{outline:2px solid #8B1A1A;outline-offset:1px;}

/* Ficha */
.ficha{background:#fff;border:0.5px solid #DDD8D8;border-radius:12px;overflow:hidden;}

/* Encabezado */
.fh{padding:1.25rem 1.75rem;border-bottom:0.5px solid #DDD8D8;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;}
.fh-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;}
.tag-red{background:#FAEAEA;color:#8B1A1A;}
.tag-green{background:#E5F5E5;color:#1A5C1A;}
.tag-amber{background:#FBF0E0;color:#7A4800;}
.fh h2{font-size:17px;font-weight:700;color:#3A1010;line-height:1.3;}
.fh-sub{font-size:12px;color:#999;margin-top:3px;}
.fh-uso{font-size:12px;color:#5F5E5A;margin-top:7px;line-height:1.55;max-width:560px;}
.fh-right{text-align:right;flex-shrink:0;}
.model{font-size:19px;font-weight:700;color:#8B1A1A;}
.brand{font-size:11px;color:#999;margin-top:3px;}
.config-lbl{font-size:11px;color:#C8C0C0;margin-top:2px;}

/* Secciones */
.secs{display:grid;grid-template-columns:1fr 1fr;}
.sec{padding:1rem 1.5rem;border-right:0.5px solid #DDD8D8;border-bottom:0.5px solid #DDD8D8;}
.sec.full{grid-column:1/-1;border-right:none;}
.sec:nth-child(even):not(.full){border-right:none;}
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#999;font-weight:700;margin-bottom:9px;border-left:3px solid #8B1A1A;padding-left:7px;}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:4px 0;border-bottom:0.5px solid #F5F0EF;}
.row:last-child{border-bottom:none;}
.rl{font-size:12px;color:#666;flex-shrink:0;max-width:48%;}
.rv{font-size:12px;font-weight:700;color:#2C2C2A;text-align:right;}

/* Footer */
.ff{padding:.9rem 1.75rem;border-top:0.5px solid #DDD8D8;background:#FAF7F7;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.ff span{font-size:11px;color:#999;}
.btn-print{font-size:12px;padding:6px 14px;border:0.5px solid #C8C0C0;border-radius:8px;background:#fff;color:#8B1A1A;cursor:pointer;font-family:Arial,sans-serif;font-weight:700;border-color:#8B1A1A;}
.btn-print:hover{background:#8B1A1A;color:#fff;}

@media(max-width:600px){
  .secs{grid-template-columns:1fr;}
  .sec{border-right:none!important;}
  .sec.full{grid-column:1;}
  .fh{flex-direction:column;}
  .fh-uso{max-width:100%;}
}
@media print{
  body{background:#fff;padding:0;}
  .selectors,.btn-print,.header{display:none!important;}
  .ficha{border:1px solid #ccc;border-radius:0;}
  .sec{break-inside:avoid;}
  .page{max-width:100%;}
}
</style>
</head>

function fillProds(){
  const sp=document.getElementById('sel-prod');
  sp.innerHTML=DB.map((p,i)=>`<option value="${i}">${p.modelo} — ${p.nombre}</option>`).join('');
  updateVer();
}
function updateVer(){
  const pi=+document.getElementById('sel-prod').value;
  const sv=document.getElementById('sel-ver');
  sv.innerHTML=DB[pi].versiones.map((v,i)=>`<option value="${i}">${v.label}</option>`).join('');
  render();
}
function render(){
  const pi=+document.getElementById('sel-prod').value;
  const vi=+document.getElementById('sel-ver').value;
  const prod=DB[pi]; const ver=prod.versiones[vi];
  const now=new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});
  const total=ver.secciones.length;
  const secsHtml=ver.secciones.map((sec,idx)=>{
    const full=(idx===total-1 && total%2!==0)?' full':'';
    const filas=sec.campos.map(c=>`<div class="row"><span class="rl">${c[0]}</span><span class="rv">${c[1]}</span></div>`).join('');
    return `<div class="sec${full}"><div class="sec-title">${sec.titulo}</div>${filas}</div>`;
  }).join('');
  document.getElementById('ficha').innerHTML=`
    <div class="fh">
      <div>
        <div class="fh-tags">
          <span class="tag tag-red">Equipo médico</span>
          <span class="tag tag-green">ISO 13485 · ISO 9001</span>
          <span class="tag tag-amber">Certificado de Libre Venta</span>
        </div>
        <h2>${prod.nombre}</h2>
        <div class="fh-sub">${prod.modelo} &nbsp;·&nbsp; Config. ${ver.config}</div>
        <div class="fh-uso">${ver.uso}</div>
      </div>
      <div class="fh-right">
        <div class="model">${prod.modelo}</div>
        <div class="brand">Linet · República Checa</div>
        <div class="config-lbl">${ver.config}</div>
      </div>
    </div>
    <div class="secs">${secsHtml}</div>
    <div class="ff">
      <span>${prod.modelo} &nbsp;·&nbsp; ${ver.label} &nbsp;·&nbsp; ${now}</span>
      <button class="btn-print" onclick="window.print()">&#128438; Imprimir / Guardar PDF</button>
    </div>`;
}
fillProds();
</script>
